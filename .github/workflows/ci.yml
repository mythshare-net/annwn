name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Validate level data
        run: npm run validate
      - name: Unit tests (schema, generator invariants, round-trips)
        run: npm test
      - name: Build single-file artifact
        run: npm run build
      - name: Smoke test (boots in headless DOM)
        run: npm i --no-save jsdom && node tools/smoke.mjs
      - name: Endless-mode integration smoke (loads + renders a procedural level)
        run: node tools/smoke-endless.mjs

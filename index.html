 horn, and none came.","I went into Annwn, and Annwn into me.","The crimson-eared pack is patient — it knows our names.","Not by a single blow, this time. Not by a single blow.","What was given in Glyn Cuch is taken at the ford.","The cauldron's breath rose, and we were uncounted.","Three songs of Taliesin would not unbind this mist."]},Le=[{name:"I",title:"Glyn Cuch — The First Branch",branch:"Pwyll, Prince of Dyfed",tint:[26,40,38],bossName:"Hafgan · King at the Ford",bossDeath:"Hafgan falls in a single blow. Arawn's debt is paid.",story:"At Glyn Cuch you set your hounds upon a stag another pack had brought down — and that pack was Arawn's, lord of Annwn. To make amends you wear his face for a year and a day, and at the year's hinge must strike his rival Hafgan one blow only at the ford. The grey hounds with crimson ears bay beyond the gate. Walk the Otherworld. Free the shades bound in its mists.",verse:`"The mist took me at Glyn Cuch /
ere ever I heard the horn." — A bard of Dyfed`,grid:["1111111111111111","1......L.......1","1..S...11......1","1......11..S...1","1.L............1","11111....11....1","1...1....11.L..1","1.E.1.........S1","1...1....1111..1","1...L....1..1..1","1...S....1..1.E1","1........1..1..1","1..11111.1..1..1","1.........B....1","1......S......31","1111111111111111"],torches:[[2,1],[13,1],[2,4],[13,4],[7,9],[13,7],[5,13]],start:{x:2.5,y:2.5,a:0},lorestones:[{x:7,y:1,id:"i_glyncuch",title:"Glyn Cuch",body:"In the wood of Glyn Cuch, Pwyll loosed his hounds upon a stag — but found another pack already at the kill, white of body with red ears, the colour of Annwn. The huntsman of that pack was Arawn, king of the Otherworld, and Pwyll's rough courtesy began the bargain that bound him here."},{x:1,y:4,id:"i_cwnannwn",title:"Cŵn Annwn",body:"The Hounds of Annwn are white with crimson ears, and their baying is heard most clear in autumn skies above the marches of Wales. To hear them too near is a death-omen; to see them is to know that the Otherworld hunts close behind. They are the only hounds that the dead obey."},{x:12,y:6,id:"i_arawn_bargain",title:"Arawn's Bargain",body:"For a year and a day Pwyll wore Arawn's shape and held his throne, sharing nothing with the queen of Annwn but a courteous bed. So the friendship of the two kings was forged — and Pwyll earned the name Pen Annwn, Head of the Otherworld, by which he was known thereafter."},{x:4,y:9,id:"i_hafgan",title:"Hafgan, King at the Ford",body:"Arawn's rival ruled the other half of Annwn and could not be killed by any blow but the first. A second stroke would heal him whole. At year's end Pwyll met him at the ford and gave the one stroke that was needed. Annwn was made one realm under Arawn — and Pwyll went home."}],soulPool:[{name:"Eilonwy of the Mist",line:"My lord, the horn never came."},{name:"Idris the Forester",line:"I saw the white pack first — too late, too late."},{name:"Glyn, master of hounds",line:"They had red ears. I should have known."},{name:"Rhiwallon the bard",line:"Sing me home, prince. Sing me home."},{name:"Tegid of Dyfed",line:"The year is almost done, is it not?"},{name:"Mair, milkmaid of Narberth",line:"They say the king wore another's face."},{name:"Cadell the Old",line:"I never crossed the ford. I never crossed the ford."},{name:"Bleddyn the Huntsman",line:"Arawn's pack runs faster than ours."}]},{name:"II",title:"Branwen's Hall — The Second Branch",branch:"Branwen ferch Llŷr",tint:[44,20,28],bossName:"Efnysien · Breaker of the Cauldron",bossDeath:"Efnysien shatters the Pair Dadeni from within — the cauldron is broken.",story:"The Pair Dadeni — the Cauldron of Rebirth — was carried to Ireland for Branwen's wedding, and into it the slain are cast to rise again mute and deathless. Now her brother Bran the Blessed lies wounded by a poisoned spear, and only Efnysien's last act will break the cauldron's curse. Press on. The Irish hall lies past the river Llinon.",verse:`"Reborn from the cauldron, no tongue was left them /
to name their own kin." — Llyfr Coch Hergest, II`,grid:["1111111111111111","1......W..L....1","1.S..2222..S...1","1....2..2......1","1.L..2..2..222.1","1.E..2..2..2.2.1","1....2..2..2.2.1","1.........L.2.S1","1.2222.222.2.2.1","1.2....B.....2.1","1.2.S..2222..2.1","1.2.L..2..W..2.1","1.222222..2222.1","1......S.E.....1","1.............31","1111111111111111"],torches:[[1,1],[14,1],[1,7],[12,7],[1,13],[14,13]],start:{x:2.5,y:2.5,a:0},lorestones:[{x:10,y:1,id:"ii_bran",title:"Bran the Blessed",body:"Bendigeidfran, Bran the Blessed, was high king of the Island of the Mighty — so vast he could wade the Irish Sea with his fleet at his side. Wounded in the foot by a poisoned spear at Branwen's war, he ordered his head cut from his body and borne home. For seven years it sang to his companions at Harlech, and longer still at Gwales."},{x:2,y:4,id:"ii_starling",title:"Branwen's Starling",body:"Wed to Matholwch of Ireland and beaten daily in his kitchens, Branwen taught a starling words and sent it across the sea to her brother. So Bran came in war — and Branwen, when at last she returned to Wales, looked at the two slaughtered hosts and her heart broke in her breast on the banks of the Alaw."},{x:11,y:7,id:"ii_pair_dadeni",title:"The Pair Dadeni",body:"The Cauldron of Rebirth was given by Bran to Matholwch in apology. Cast a slain man into it that night and he rises on the morrow whole — but mute, and remembering nothing of who he was. So the Irish fought on past death, and the Welsh could not win, until Efnysien hid among the slain and burst the cauldron with his own heart."},{x:3,y:11,id:"ii_efnysien",title:"Efnysien",body:"Half-brother to Bran and Branwen, Efnysien's spite began the war: he maimed Matholwch's horses at the wedding feast, and threw Branwen's infant son Gwern into the hall-fire. Yet at the end it was his body alone that broke the cauldron and saved what remained of the Island of the Mighty."}],soulPool:[{name:"Gwern, the child cast to the fire",line:"Mother. Mother."},{name:"Heilyn fab Gwyn",line:"We carried his head to Harlech, and it sang."},{name:"Pryderi, who returned",line:"Seven of us came home. Only seven."},{name:"Manawydan fab Llŷr",line:"My brother's wound would not close."},{name:"Taliesin, before he was a bard",line:"At Gwales we forgot a long time."},{name:"A drummer of Matholwch",line:"I died in Ireland. I rose without tongue."},{name:"Branwen's starling",line:"Across the sea, across the sea."},{name:"Ynawg of the Seven",line:"Do not open the door to Cornwall."}]},{name:"III",title:"The Mist of Dyfed — The Third Branch",branch:"Manawydan fab Llŷr",tint:[22,30,40],bossName:"Llwyd ap Cil Coed · The Enchanter",bossDeath:"Llwyd unweaves the mist — Dyfed returns to the green world.",story:"Returned from Ireland, you sit at Gorsedd Arberth with Pryderi, Cigfa and Rhiannon. A peal of thunder, and when the mist lifts every house, every herd, every soul in Dyfed is gone. Llwyd ap Cil Coed has cast this enchantment in vengeance for an old slight to Gwawl ap Clud. Free what remains, find the mouse-host, and bargain the kingdom back.",verse:`"Empty was Dyfed, empty Arberth, /
empty the seven cantrefs of the south." — A song of Manawydan`,grid:["1111111111111111","1S.L.........S.1","1..............1","1..2222...2222.1","1..2..2...2..2.1","1.L2..2.L.2..2.1","1..2..2...2..2.1","1..2..2...2..2.1","1..2..22222..2.1","1..2.........2.1","1..2.E..S..E.2.1","1..2.........2.1","1..2222...2222.1","1.....L.B......1","1.S....3......S1","1111111111111111"],torches:[[1,1],[14,1],[7,5],[1,9],[14,9],[7,12]],start:{x:1.5,y:1.5,a:0},lorestones:[{x:3,y:1,id:"iii_pryderi_loss",title:"The Vanished Kingdom",body:"At Gorsedd Arberth came thunder and a fall of mist. When it lifted, no house stood, no herd lowed, no man or woman remained in Dyfed save Manawydan, Pryderi, Rhiannon and Cigfa. The four lived alone in the empty country for two years, hunting wild honey and mead, before they sought work in the towns of Lloegr."},{x:2,y:5,id:"iii_manawydan_craft",title:"The Craftsman King",body:"Manawydan, son of Llŷr, was a king without a kingdom and learned three trades by his own wit: saddler, shieldwright, and shoemaker. His work was so fine that every other craftsman of Hereford rose against him. In each town he was driven out — and so returned to ruined Dyfed."},{x:8,y:5,id:"iii_rhiannon_pryderi",title:"Rhiannon and Pryderi",body:"Pryderi laid hand on a golden bowl chained to a slab and could neither speak nor let go. Rhiannon, his mother — once accused of devouring her own child, once made to bear guests on her back like a horse — came to free him, and was taken by the same enchantment. Both vanished into Llwyd's caer."},{x:6,y:13,id:"iii_llwyd",title:"Llwyd ap Cil Coed",body:"The enchanter Llwyd cast the mist upon Dyfed in vengeance for the humiliation of his friend Gwawl ap Clud — whom Pwyll had once tricked at Rhiannon's bridal feast, beating him inside a magical bag. Llwyd's mouse-host devoured Manawydan's wheat, and only by catching the queen-mouse did Manawydan win Dyfed back."}],soulPool:[{name:"Cigfa, daughter of Gwynn Glôyw",line:"He took Pryderi at the bowl. Don't touch it."},{name:"A craftsman of Hereford",line:"His saddles were too fine, too fine."},{name:"A mouse-shape, given woman's voice",line:"Spare the small one, lord. She is heavy with child."},{name:"Pryderi fab Pwyll",line:"My hand will not come off the bowl."},{name:"Rhiannon, who once bore guests",line:"I have worn a horse's collar before. I can wear it again."},{name:"A shieldwright of Lloegr",line:"They drove us out for the work of our hands."},{name:"Gwawl ap Clud, in the bag",line:"Beaten, beaten, beaten."},{name:"A swineherd of Arberth",line:"The mist took the hogs first."}]},{name:"IV",title:"Caer Dathyl — The Fourth Branch",branch:"Math fab Mathonwy",tint:[36,28,46],bossName:"Gwyn ap Nudd · King of the Wild Hunt",bossDeath:"Gwyn ap Nudd is unhorsed. The borrowed crown lifts from your brow.",story:"At the year's hinge, the way home leads through Caer Dathyl, hall of Math fab Mathonwy, who cannot live save with his feet in a virgin's lap except when he is at war. Here Gwydion wove women from flowers and men from staves, and Lleu Llaw Gyffes was given his name. Past the bone-altar waits Gwyn ap Nudd, antlered king of the Wild Hunt — last warden of Annwn's gate.",verse:`"Three things won at Caer Sidi: /
